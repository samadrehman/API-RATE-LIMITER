apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-rate-limiter
  labels:
    app: api-rate-limiter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-rate-limiter
  template:
    metadata:
      labels:
        app: api-rate-limiter
    spec:
      containers:
        - name: api-rate-limiter
          image: api-rate-limiter:latest
          imagePullPolicy: IfNotPresent
          command: ["gunicorn", "app:app", "--worker-class", "gthread", "--threads", "4", "--workers", "2", "--bind", "0.0.0.0:8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-rate-limiter-config
            - secretRef:
                name: api-rate-limiter-secrets
          volumeMounts:
            - mountPath: /app/data
              name: api-rate-limiter-data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: api-rate-limiter-data
          persistentVolumeClaim:
            claimName: api-rate-limiter-pvc
